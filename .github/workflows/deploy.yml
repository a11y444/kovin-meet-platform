name: Deploy KOVIN Meet

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_backup:
        description: 'Skip pre-deploy backup'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # Lint and Type Check
  # ============================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run ESLint
        run: pnpm lint

      - name: Run TypeScript type check
        run: pnpm exec tsc --noEmit

  # ============================================================================
  # Run Tests
  # ============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: kovin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run database migrations
        run: pnpm exec prisma db push
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/kovin_test

      - name: Run tests
        run: pnpm test --passWithNoTests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/kovin_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

  # ============================================================================
  # Build Docker Image
  # ============================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============================================================================
  # Pre-Deploy Backup
  # ============================================================================
  backup:
    name: Pre-Deploy Backup
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production') &&
      github.event.inputs.skip_backup != 'true'
    environment: ${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Create backup on server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            set -e
            cd /opt/kovin-meet
            
            BACKUP_DIR="backups"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            DEPLOY_BACKUP_DIR="${BACKUP_DIR}/deploy_${TIMESTAMP}"
            
            mkdir -p $DEPLOY_BACKUP_DIR
            
            echo "Creating pre-deploy backup..."
            
            # Backup database
            docker exec kovin-postgres pg_dump -U kovin kovin_meet > "${DEPLOY_BACKUP_DIR}/postgres.sql"
            
            # Backup .env and config
            cp .env "${DEPLOY_BACKUP_DIR}/.env.backup"
            tar -czf "${DEPLOY_BACKUP_DIR}/config.tar.gz" config/
            
            # Create rollback script
            cat > "${DEPLOY_BACKUP_DIR}/rollback.sh" << 'EOF'
            #!/bin/bash
            echo "Rolling back to backup from: $TIMESTAMP"
            docker compose down
            cat postgres.sql | docker exec -i kovin-postgres psql -U kovin kovin_meet
            cp .env.backup ../.env
            docker compose up -d
            echo "Rollback complete"
          EOF
            chmod +x "${DEPLOY_BACKUP_DIR}/rollback.sh"
            
            echo "Backup created: ${DEPLOY_BACKUP_DIR}"
            
            # Keep only last 5 deploy backups
            cd $BACKUP_DIR
            ls -dt deploy_*/ | tail -n +6 | xargs -r rm -rf
          ENDSSH

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: pre-deploy-backup-${{ github.sha }}
          path: |
            backups/
          retention-days: 7

  # ============================================================================
  # Deploy to Staging
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, backup]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.kovin-meet.example.com
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.STAGING_HOST }} << 'ENDSSH'
            set -e
            cd /opt/kovin-meet
            
            echo "Pulling latest image..."
            docker pull ${{ needs.build.outputs.image_tag }}
            
            echo "Updating docker-compose..."
            docker compose pull
            
            echo "Running database migrations..."
            docker compose exec -T app npx prisma migrate deploy
            
            echo "Restarting application..."
            docker compose up -d --no-deps app
            
            echo "Waiting for health check..."
            sleep 10
            
            # Health check
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "Deployment successful!"
            else
              echo "Health check failed, rolling back..."
              docker compose rollback app
              exit 1
            fi
            
            echo "Cleaning up old images..."
            docker image prune -f
          ENDSSH

      - name: Notify deployment success
        if: success()
        run: |
          echo "Staging deployment successful!"
          # Add Slack/Discord notification here

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "Staging deployment failed!"
          # Add Slack/Discord notification here

  # ============================================================================
  # Deploy to Production
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, backup]
    if: |
      github.ref == 'refs/heads/production' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://meet.kovin.example.com
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to production
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.PRODUCTION_HOST }} << 'ENDSSH'
            set -e
            cd /opt/kovin-meet
            
            echo "=== Production Deployment Starting ==="
            echo "Timestamp: $(date)"
            echo "Commit: ${{ github.sha }}"
            
            # Store current image for rollback
            CURRENT_IMAGE=$(docker compose images app --format json | jq -r '.[0].Repository + ":" + .[0].Tag')
            echo "Current image: $CURRENT_IMAGE"
            
            echo "Pulling latest image..."
            docker pull ${{ needs.build.outputs.image_tag }}
            
            echo "Creating deployment marker..."
            echo "${{ github.sha }}" > .deploy_version
            
            echo "Running database migrations..."
            docker compose exec -T app npx prisma migrate deploy
            
            echo "Performing rolling update..."
            docker compose up -d --no-deps --scale app=2 app
            sleep 15
            
            # Health check new instances
            NEW_HEALTHY=false
            for i in {1..6}; do
              if docker compose exec -T app wget -q --spider http://localhost:3000/api/health; then
                NEW_HEALTHY=true
                break
              fi
              echo "Waiting for new instances... attempt $i"
              sleep 5
            done
            
            if [ "$NEW_HEALTHY" = false ]; then
              echo "New instances failed health check, rolling back..."
              docker compose up -d --no-deps app
              docker tag $CURRENT_IMAGE app:rollback
              exit 1
            fi
            
            # Scale back to 1 instance
            docker compose up -d --no-deps --scale app=1 app
            
            echo "Deployment successful!"
            echo "=== Production Deployment Complete ==="
            
            # Cleanup
            docker image prune -f
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 30
          HEALTH_STATUS=$(curl -sf https://${{ secrets.PRODUCTION_DOMAIN }}/api/health || echo "failed")
          if [ "$HEALTH_STATUS" = "failed" ]; then
            echo "Production health check failed!"
            exit 1
          fi
          echo "Production is healthy"

      - name: Create deployment tag
        if: success()
        run: |
          git tag -a "deploy-$(date +%Y%m%d-%H%M%S)" -m "Production deployment ${{ github.sha }}"
          git push origin --tags

      - name: Notify deployment success
        if: success()
        run: |
          echo "Production deployment successful!"
          # Add Slack/Discord/PagerDuty notification here

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "Production deployment failed!"
          # Add Slack/Discord/PagerDuty notification here

  # ============================================================================
  # Cleanup Old Images
  # ============================================================================
  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    permissions:
      packages: write

    steps:
      - name: Delete old container images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true
