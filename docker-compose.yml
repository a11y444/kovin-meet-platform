version: '3.8'

# KOVIN Meet - Docker Compose Configuration
# This file is for development/standalone deployment
# For production, use install.sh which generates a customized version

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: kovin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kovin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-kovin_meet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kovin} -d ${POSTGRES_DB:-kovin_meet}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - kovin-network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: kovin-redis
    restart: unless-stopped
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - kovin-network

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: kovin-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - kovin-network

  # LiveKit Server (WebRTC SFU)
  livekit:
    image: livekit/livekit-server:latest
    container_name: kovin-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml --dev
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}:${LIVEKIT_API_SECRET}"
    volumes:
      - ./config/livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    networks:
      - kovin-network

  # Coturn TURN Server
  coturn:
    image: coturn/coturn:latest
    container_name: kovin-coturn
    restart: unless-stopped
    command: >
      -n
      --log-file=stdout
      --listening-port=3478
      --tls-listening-port=5349
      --external-ip=${SERVER_IP:-127.0.0.1}
      --relay-ip=0.0.0.0
      --min-port=49152
      --max-port=65535
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET:?TURN_SECRET is required}
      --realm=${DOMAIN:-localhost}
      --fingerprint
      --lt-cred-mech
      --no-cli
      --no-multicast-peers
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "49152-49252:49152-49252/udp"
    networks:
      - kovin-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kovin-app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-kovin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kovin_meet}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-kovin-recordings}
      MINIO_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    ports:
      - "3000:3000"
    networks:
      - kovin-network

  # Nginx Reverse Proxy (Production only)
  nginx:
    image: nginx:alpine
    container_name: kovin-nginx
    restart: unless-stopped
    profiles:
      - production
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - app
      - livekit
      - minio
    ports:
      - "80:80"
      - "443:443"
    networks:
      - kovin-network

  # Certbot for SSL (Production only)
  certbot:
    image: certbot/certbot
    container_name: kovin-certbot
    profiles:
      - production
    volumes:
      - ./certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - kovin-network

  # Database Admin (Development only)
  adminer:
    image: adminer:latest
    container_name: kovin-adminer
    restart: unless-stopped
    profiles:
      - development
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - kovin-network

  # Redis Admin (Development only)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: kovin-redis-commander
    restart: unless-stopped
    profiles:
      - development
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - kovin-network

networks:
  kovin-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  certbot_webroot:
    driver: local
